<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CSA Community - Sacred Ministries and Parish life">
  <title>Community - Catholic Student Association</title>

  <!-- Hub Module Styles -->
  <link rel="stylesheet" href="/community-view/styles/variables.css">
  <link rel="stylesheet" href="/community-view/styles/reset.css">
  <link rel="stylesheet" href="/community-view/styles/components.css">
  <link rel="stylesheet" href="/community-view/styles/hub.css">
  <script>
    window.onerror = function(msg, url, line, col, error) {
      if (window.parent) {
        window.parent.postMessage({
          type: 'HUB_ERROR',
          error: msg + ' at ' + url + ':' + line + ':' + col
        }, '*');
      }
      return false;
    };
  </script>
</head>

<body class="csa-hub-module">
  <header class="csa-hub-header">
    <div class="csa-choir-container">
      <h1 class="csa-hub-title">Catholic Community</h1>
      <p id="debug-hub-status" style="color: white; font-size: 10px; opacity: 0.5;">HUB COMPONENT: LOADED</p>
    </div>
  </header>

  <main class="csa-choir-container">
    <section class="csa-hub-hero">
      <div class="csa-hub-hero__content">
        <span class="csa-hub-badge">Catholic Student Association</span>
        <h2>Our Sacred Ministries</h2>
        <p>Welcome to our vibrant spiritual home. Explore our diverse ministries, join us in faith, and serve with passion as we grow together in Christ.</p>
      </div>
    </section>

    <div id="hub-grid-container" class="csa-choir-grid csa-choir-grid--3-cols">
      <!-- Hub modules will be rendered here by TS -->
      <div class="csa-choir-text-center">
        <div class="csa-choir-loading"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { HubLandingPage } from '/community-view/dist/sacramental/pages/hub-landing.js';
    
    // Initialize Hub page
    const hubPage = new HubLandingPage('hub-grid-container');
    hubPage.init();
  </script>
</body>

</html>
