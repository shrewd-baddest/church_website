<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catholic Student Association community module page">
  <title>CSA Module - Catholic Student Association</title>

  <!-- Module Styles -->
  <link rel="stylesheet" href="/hub-view/styles/variables.css">
  <link rel="stylesheet" href="/hub-view/styles/reset.css">
  <link rel="stylesheet" href="/hub-view/styles/components.css">
  <link rel="stylesheet" href="/hub-view/components/sidebar.css">
  <link rel="stylesheet" href="/hub-view/components/hero-section.css">
  <link rel="stylesheet" href="/hub-view/components/announcements.css">
  <link rel="stylesheet" href="/hub-view/components/choir-officials.css">
  <link rel="stylesheet" href="/hub-view/components/semester-activities.css">
  <link rel="stylesheet" href="/hub-view/components/social-media.css">
  <link rel="stylesheet" href="/hub-view/components/gallery.css">
  <link rel="stylesheet" href="/hub-view/components/module-info.css">
  <link rel="stylesheet" href="/hub-view/components/registration-form.css">
</head>

<body class="csa-choir-module">
  <!-- Sidebar Container -->
  <div id="choir-sidebar-container"></div>

  <!-- Hero Section -->
  <section id="choir-hero"></section>

  <!-- Module Info (schedule, fees, story, agenda) -->
  <section id="module-info"></section>

  <!-- Announcements -->
  <section class="csa-choir-container">
    <div id="choir-announcements"></div>
  </section>

  <!-- Registration Form -->
  <section id="registration"></section>

  <!-- Semester Activities -->
  <section id="choir-activities"></section>

  <!-- Officials -->
  <section id="choir-officials"></section>

  <!-- Gallery -->
  <section id="choir-gallery"></section>

  <!-- Social Media -->
  <section id="choir-social"></section>

  <script type="module">
    import { ChoirLandingPage } from '/hub-view/dist/sacramental/pages/landing-page.js';
    import { ModuleInfo } from '/hub-view/dist/sacramental/components/module-info.js';
    import { Sidebar } from '/hub-view/dist/sacramental/components/Sidebar.js';
    import { Gallery } from '/hub-view/dist/sacramental/components/gallery.js';
    import { HubMessenger } from '/hub-view/dist/sacramental/services/HubMessenger.js';
    import { RegistrationForm } from '/hub-view/dist/sacramental/components/registration-form.js';

    // Initialize sidebar only if not in an iframe
    if (window.self === window.top) {
      const sidebar = new Sidebar('choir-sidebar-container');
      sidebar.init();
    } else {
      document.getElementById('choir-sidebar-container').style.display = 'none';
      document.body.classList.add('is-embedded');
      
      // Add a Back to Hub button for iframe view
      const backBtn = document.createElement('a');
      backBtn.className = 'csa-choir-btn csa-choir-btn--secondary csa-hub-back-btn';
      backBtn.innerHTML = '<i class="fas fa-chevron-left"></i> Back to Hub';
      backBtn.style.margin = '1rem';
      backBtn.onclick = () => HubMessenger.requestParentNavigate('');
      document.body.prepend(backBtn);
    }

    // Fetch module data and render module-specific info section
    async function initModuleInfo() {
      try {
        const response = await fetch(window.location.pathname, {
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          const data = await response.json();
          
          // Notify parent that this module is loaded
          HubMessenger.notifyModuleLoaded(data.id);

          if (data.color) {
            document.documentElement.style.setProperty('--csa-choir-primary', data.color);
            // Also apply a slightly darker shade if we want for gradients, but CSS will fallback to primary-dark or we can override it too.
            // A simple hack: set primary-dark to the same color but maybe keep the original dark blending, or just set both.
            document.documentElement.style.setProperty('--csa-choir-primary-dark', data.color);
          }

          const moduleInfo = new ModuleInfo('module-info', data);
          moduleInfo.render();

          // Initialize registration form with dynamic module name
          const registrationForm = new RegistrationForm(
            'registration',
            20, 
            'Ksh',
            (registrationId) => {
              console.log('Registration successful:', registrationId);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            data.title || 'Module'
          );
          registrationForm.render();
        }
      } catch (e) {
        console.error('Failed to load module info:', e);
      }
    }

    // Initialize landing page (hero, announcements, officials, activities, social)
    const landingPage = new ChoirLandingPage();
    landingPage.init();

    // Initialize module-specific info
    initModuleInfo();

    // Initialize gallery
    const gallery = new Gallery('choir-gallery');
    gallery.init();
  </script>
</body>

</html>
