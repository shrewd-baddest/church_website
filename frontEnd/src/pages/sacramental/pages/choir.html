<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Join the CSA Choir - A community of worship, fellowship, and musical excellence">
  <title>CSA Choir - Catholic Student Association</title>

  <!-- Choir Module Styles -->
  <link rel="stylesheet" href="/community-view/styles/variables.css">
  <link rel="stylesheet" href="/community-view/styles/reset.css">
  <link rel="stylesheet" href="/community-view/styles/components.css">
  <link rel="stylesheet" href="/community-view/components/sidebar.css">
  <link rel="stylesheet" href="/community-view/components/hero-section.css">
  <link rel="stylesheet" href="/community-view/components/next-practice-countdown.css">
  <link rel="stylesheet" href="/community-view/components/announcements.css">
  <link rel="stylesheet" href="/community-view/components/practice-schedule.css">
  <link rel="stylesheet" href="/community-view/components/choir-officials.css">
  <link rel="stylesheet" href="/community-view/components/music-classes.css">
  <link rel="stylesheet" href="/community-view/components/semester-activities.css">
  <link rel="stylesheet" href="/community-view/components/social-media.css">
  <link rel="stylesheet" href="/community-view/components/registration-form.css">
  <link rel="stylesheet" href="/community-view/components/gallery.css">
</head>

<body class="csa-choir-module">
  <!-- Sidebar Container -->
  <div id="choir-sidebar-container"></div>

  <!-- Hero Section -->
  <section id="choir-hero"></section>

  <!-- Next Practice Countdown -->
  <section class="csa-choir-container">
    <div id="choir-next-practice"></div>
  </section>

  <!-- Announcements -->
  <section class="csa-choir-container">
    <div id="choir-announcements"></div>
  </section>

  <!-- Registration Form -->
  <!-- Registration Form -->
  <section id="registration"></section>

  <!-- Practice Schedule -->
  <section id="choir-schedule"></section>

  <!-- Semester Activities -->
  <section id="choir-activities"></section>

  <!-- Choir Officials -->
  <section id="choir-officials"></section>

  <!-- Music Classes -->
  <section id="choir-music-classes"></section>

  <!-- Gallery -->
  <section id="choir-gallery"></section>

  <!-- Social Media -->
  <section id="choir-social"></section>

  <script type="module">
    import { ChoirLandingPage } from '/community-view/dist/sacramental/pages/landing-page.js';
    import { RegistrationForm } from '/community-view/dist/sacramental/components/registration-form.js';
    import { Sidebar } from '/community-view/dist/sacramental/components/Sidebar.js';
    import { Gallery } from '/community-view/dist/sacramental/components/gallery.js';
    import { HubMessenger } from '/community-view/dist/sacramental/services/HubMessenger.js';

    // Initialize sidebar only if not in an iframe
    if (window.self === window.top) {
      const sidebar = new Sidebar('choir-sidebar-container');
      sidebar.init();
    } else {
      // Hide sidebar container if in iframe
      document.getElementById('choir-sidebar-container').style.display = 'none';
      document.body.classList.add('is-embedded');

      // Add a Back button for iframe view
      const backBtn = document.createElement('a');
      backBtn.className = 'csa-choir-btn csa-choir-btn--secondary csa-hub-back-btn';
      backBtn.innerHTML = '<i class="fas fa-chevron-left"></i> Back';
      backBtn.style.margin = '1rem';
      backBtn.onclick = () => HubMessenger.requestParentNavigate('');
      document.body.prepend(backBtn);
    }

    // Initialize landing page
    const landingPage = new ChoirLandingPage();
    landingPage.init();

    // Notify parent that choir is loaded
    HubMessenger.notifyModuleLoaded('choir');

    // Initialize registration form separately
    const registrationForm = new RegistrationForm(
      'registration',
      20,
      'Ksh',
      (registrationId) => {
        console.log('Registration successful:', registrationId);
        // Scroll to top after successful registration
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    );
    registrationForm.render();

    // Initialize gallery
    const gallery = new Gallery('choir-gallery');
    gallery.init();
  </script>
</body>

</html>
